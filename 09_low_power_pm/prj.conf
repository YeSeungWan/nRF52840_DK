# ==========================================================================
# Hardware Drivers and Peripheral Configurations
# ==========================================================================
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_WATCHDOG=y

# ==========================================================================
# Analog-to-Digital Converter (ADC) Configuration
# ==========================================================================
# Enable ADC Driver API Subsystem
CONFIG_ADC=y
CONFIG_NRFX_SAADC=y
CONFIG_ADC_NRFX_SAADC=y

# Enable asynchronous/non-blocking ADC sampling support
CONFIG_ADC_ASYNC=y

# ==========================================================================
# Power Management (PM) Configuration
# ==========================================================================
# Enable Zephyr Power Management subsystem infrastructure
CONFIG_PM=y

# Enable Dynamic Device Power Management to control individual peripherals (UART, SAADC, etc.)
CONFIG_PM_DEVICE=y

# Tickless Kernel: Suppress system timer interrupts when idle to maximize Deep Sleep duration
CONFIG_TICKLESS_KERNEL=y
CONFIG_SYS_CLOCK_EXISTS=y

# ==========================================================================
# Logging and Console Outputs
# ==========================================================================
CONFIG_PRINTK=y
CONFIG_LOG=y

# Deferred Logging: Buffer log messages to prevent synchronous UART transmission current spikes
CONFIG_LOG_MODE_DEFERRED=y

# ==========================================================================
# Debugging and Thread Analysis Infrastructure
# ==========================================================================
# Enable Zephyr built-in debugging subsystem and symbol information
CONFIG_DEBUG=y

# Switch compiler optimization to debugging-friendly (-Og) mode
CONFIG_DEBUG_OPTIMIZATIONS=y

# Enable thread naming and analyzer tools for runtime profiling
CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=y

# Disable MPU Stack Guard to prevent Hardware MPU Region depletion (Required for Cortex-M4 8-region limits)
CONFIG_HW_STACK_PROTECTION=n

# ==========================================================================
# Build and Partition System Control
# ==========================================================================
# Disable Partition Manager to use default device memory map
CONFIG_PARTITION_MANAGER_ENABLED=n